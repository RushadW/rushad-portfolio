name: Sync README Summaries

on:
  # schedule:
  #   - cron: '0 0 * * *'  # Scheduled daily run (commented out for testing)
  workflow_dispatch:      # Manual trigger button in GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Sync README Summaries
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run summarize

      - name: Commit and push if cache updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/readme-cache.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update readme-cache.json [skip ci]" && git push)
