<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rushad Wankadia — software engineer. Systems, firmware, and backend infrastructure." />
    <title>rushad@portfolio:~$</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Archivo+Black&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22black%22/><text y=%2270%22 x=%2218%22 font-size=%2260%22 fill=%22%23FFAA00%22 font-family=%22monospace%22>&gt;_</text></svg>"
    />
  </head>
  <body>
    <div id="root">
      <!-- Boot spinner: mirrors src/components/AsciiSpinner.jsx, shown
           until React mounts and replaces this markup. Styles are inline
           because the app CSS hasn't loaded yet at this point. -->
      <div
        id="boot-loader"
        role="status"
        aria-live="polite"
        style="
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #f2efe6;
          color: #111;
          font-family: 'Fira Code', ui-monospace, Menlo, Consolas, monospace;
          font-size: clamp(1.1rem, 2.5vw, 1.6rem);
        "
      >
        <span
          style="
            border: 3px solid #111;
            background: #111;
            color: #ffaa00;
            padding: 1.5rem 2.25rem;
            box-shadow: 6px 6px 0 #111;
          "
        >
          <span id="boot-spinner" aria-hidden="true" style="color: #f2efe6">⠋</span>
          booting rushad@portfolio ...
        </span>
      </div>
    </div>
    <script>
      (function () {
        var frames = ['⠋', '⠙', '⠹', '⠸', '⠼', '⠴', '⠦', '⠧', '⠇', '⠏'];
        var i = 0;
        var id = setInterval(function () {
          var el = document.getElementById('boot-spinner');
          if (!el) return clearInterval(id); // React took over
          el.textContent = frames[(i = (i + 1) % frames.length)];
        }, 90);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
